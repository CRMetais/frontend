name: Deploy Frontend to Dist Folder

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão estável do Node

      - name: Build
        run: |
          npm install
          npm run build

      - name: Push to Target Repo
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TARGET_TOKEN}@github.com/CRMetais/TF.git destino
          
          # Cria a pasta dist no destino (se não existir)
          mkdir -p destino/dist
          
          # Limpa o conteúdo antigo da pasta dist no destino para não acumular lixo
          rm -rf destino/dist/*
          
          # Copia o conteúdo gerado no build para a pasta dist do destino
          cp -r dist/* destino/dist/
          
          # Move para o repositório destino para fazer o commit
          cd destino
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Adiciona apenas as alterações da pasta dist
          git add dist/
          git commit -m "chore: update frontend in dist folder" || echo "No changes"
          git push origin main
