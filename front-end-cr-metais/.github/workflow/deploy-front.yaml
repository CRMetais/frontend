name: Deploy Frontend to Root

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão estável do Node

      - name: Build
        run: |
          npm install
          npm run build

      - name: Push to Target Repo
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TARGET_TOKEN}@github.com/CRMetais/TF.git destino
          
          # Move para a pasta do repo destino
          cd destino
          
          # Remove arquivos antigos da raiz para não acumular lixo
          # Mantemos a pasta 'backend' e o '.git'
          find . -maxdepth 1 ! -name 'backend' ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # Copia o conteúdo de DIST (que está um nível acima) para a raiz atual
          cp -r ../dist/* .
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update frontend dist in root" || echo "No changes"
          git push origin main